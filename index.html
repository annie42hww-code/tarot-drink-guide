<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔮 塔罗牌饮品指引</title>
<style>
:root {
  --bg-deep: #0a0010;
  --bg-purple: #1a0a2e;
  --gold: #d4a843;
  --gold-light: #f0d68a;
  --purple-light: #b366ff;
  --text: #e8d5f5;
  --card-bg: #150a25;
  --magic-glow: rgba(179,102,255,0.5);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--bg-deep);color:var(--text);min-height:100vh;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}

#stars-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}

.particle{
  position:fixed;pointer-events:none;z-index:1;font-size:1.2rem;opacity:0;
  animation:floatUp 4s ease-out forwards;
}
@keyframes floatUp{
  0%{opacity:1;transform:translateY(0)scale(.5)rotate(0deg)}
  50%{opacity:.8;transform:translateY(-100px)scale(1.2)rotate(180deg)}
  100%{opacity:0;transform:translateY(-250px)scale(.3)rotate(360deg)}
}

.page{
  position:relative;z-index:2;min-height:100vh;display:none;
  flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem;
}
.page.active{display:flex}

/* Start Page */
.start-emoji{font-size:clamp(4rem,10vw,7rem);display:block;text-align:center;margin-bottom:1rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)}}
.start-title{
  font-size:clamp(2rem,6vw,3.5rem);color:var(--gold);text-align:center;
  text-shadow:0 0 30px var(--magic-glow),0 0 60px var(--purple-light);
  margin-bottom:.5rem;animation:titleGlow 3s ease-in-out infinite;
}
@keyframes titleGlow{
  0%,100%{text-shadow:0 0 20px var(--magic-glow),0 0 40px var(--purple-light)}
  50%{text-shadow:0 0 40px var(--magic-glow),0 0 80px var(--purple-light),0 0 120px var(--gold)}
}
.start-subtitle{font-size:1.1rem;text-align:center;max-width:400px;line-height:1.8;margin-bottom:2.5rem;opacity:.85}

.btn-magic{
  position:relative;padding:1rem 2.5rem;font-size:1.2rem;font-weight:bold;
  color:var(--bg-deep);background:linear-gradient(135deg,var(--gold),var(--gold-light));
  border:none;border-radius:50px;cursor:pointer;letter-spacing:.05em;
  transition:all .3s;box-shadow:0 0 30px var(--magic-glow);font-family:inherit;z-index:3;
}
.btn-magic:hover{transform:scale(1.05);box-shadow:0 0 50px var(--magic-glow),0 0 80px rgba(179,102,255,.3)}
.btn-magic:active{transform:scale(.97)}

/* Draw Page */
.draw-header{text-align:center;margin-bottom:1.5rem}
.draw-title{font-size:1.6rem;color:var(--gold);text-shadow:0 0 15px var(--magic-glow);margin-bottom:.5rem}
.draw-hint{font-size:1rem;opacity:.8}
.cards-container{display:flex;gap:clamp(.8rem,3vw,2rem);flex-wrap:wrap;justify-content:center;perspective:1500px}

/* Card */
.card-scene{width:clamp(120px,28vw,200px);height:clamp(180px,42vw,300px);perspective:800px;cursor:pointer;transition:transform .3s ease}
.card-scene:hover{transform:translateY(-8px)}
.card-inner{position:relative;width:100%;height:100%;transition:transform .8s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.card-scene.flipped .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{
  position:absolute;inset:0;border-radius:14px;backface-visibility:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}

/* Card Back */
.card-back{
  background:linear-gradient(145deg,#1a0a30,#2d1155);
  border:2px solid var(--gold);
  box-shadow:0 0 20px rgba(180,100,255,.3),inset 0 0 60px rgba(100,40,180,.2);
  overflow:hidden;
}
.card-back::before{content:'';position:absolute;inset:8px;border-radius:8px;border:1.5px solid rgba(212,168,67,.5)}
.card-back-pattern{font-size:3rem;opacity:.6;animation:patternPulse 2s ease-in-out infinite}
@keyframes patternPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.7;transform:scale(1.08)}}
.card-back-moon{font-size:1.8rem;margin-top:.3rem;opacity:.5}
.card-scene:hover .card-back{box-shadow:0 0 35px rgba(200,140,255,.5),inset 0 0 80px rgba(120,60,200,.3);border-color:var(--gold-light)}

/* Card Front */
.card-front{
  background:linear-gradient(160deg,#1e0d38,#2a1150);
  border:2px solid var(--gold-light);transform:rotateY(180deg);
  box-shadow:0 0 30px rgba(200,160,80,.4),inset 0 0 50px rgba(120,80,30,.15);
  padding:1rem .7rem;gap:.3rem;text-align:center;overflow-y:auto;
}
.card-front .card-emoji{font-size:2.5rem;flex-shrink:0}
.card-front .card-name{font-size:1.1rem;font-weight:bold;color:var(--gold);flex-shrink:0}
.card-front .card-en{font-size:.65rem;opacity:.7;flex-shrink:0}
.card-front .card-keywords{font-size:.7rem;color:var(--purple-light);flex-shrink:0;margin-top:.2rem}
.card-front .card-divider{width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:.3rem 0;flex-shrink:0}
.card-front .card-drink-icon{font-size:1.5rem;flex-shrink:0}
.card-front .card-drink{font-size:.75rem;color:var(--gold-light);font-weight:bold;flex-shrink:0}
.card-front .card-shop{font-size:.6rem;opacity:.7;flex-shrink:0}

/* Result Page */
.result-container{max-width:520px;width:100%;animation:fadeInUp .6s ease-out}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
.result-card-display{
  text-align:center;margin-bottom:1.5rem;padding:2rem 1.5rem;
  background:linear-gradient(160deg,#1e0d38,#2a1150);
  border:2px solid var(--gold);border-radius:16px;
  box-shadow:0 0 40px rgba(180,120,60,.3);
}
.result-emoji{font-size:4rem;display:block;margin-bottom:.5rem}
.result-card-name{font-size:1.6rem;color:var(--gold);font-weight:bold}
.result-card-keywords{font-size:.9rem;color:var(--purple-light);margin-top:.3rem}

.result-drink-section{
  padding:1.5rem;background:linear-gradient(160deg,#1a0e30,#2a1648);
  border:2px solid var(--purple-light);border-radius:16px;
  box-shadow:0 0 30px rgba(150,80,220,.25);margin-bottom:1.5rem;
}
.result-drink-label{font-size:.9rem;opacity:.7;margin-bottom:.3rem}
.result-drink-name{font-size:1.3rem;color:var(--gold-light);font-weight:bold;margin-bottom:.3rem}
.result-drink-shop{font-size:.85rem;opacity:.8;margin-bottom:.8rem}
.result-drink-detail{display:inline-block;padding:.3rem .8rem;background:rgba(179,102,255,.15);border-radius:20px;font-size:.85rem;color:var(--purple-light)}

.result-reason{
  padding:1.2rem 1.5rem;background:rgba(255,255,255,.03);border-radius:12px;
  border-left:3px solid var(--gold);margin-bottom:1.5rem;line-height:1.8;font-size:.95rem;
}
.result-reason-label{font-size:.85rem;color:var(--gold);margin-bottom:.5rem}

.btn-retry{
  display:block;margin:0 auto;padding:.9rem 2rem;font-size:1.1rem;font-weight:bold;
  color:var(--bg-deep);background:linear-gradient(135deg,var(--gold),var(--gold-light));
  border:none;border-radius:50px;cursor:pointer;transition:all .3s;
  box-shadow:0 0 20px var(--magic-glow);font-family:inherit;
}
.btn-retry:hover{transform:scale(1.04);box-shadow:0 0 35px var(--magic-glow)}

@media(max-width:480px){
  .cards-container{gap:.5rem}
  .card-scene{width:105px;height:158px}
  .card-front .card-emoji{font-size:1.8rem}
  .card-front .card-name{font-size:.9rem}
  .card-front .card-drink{font-size:.65rem}
  .card-front{padding:.5rem .4rem;gap:.15rem}
}
</style>
</head>

      [drinkPool.c005.detail]:"柚见手摇冰茶——手摇的动作本身就是一种等待与耐心。倒吊人教导我们：有些事情不是你去推动它，而是你放手，让它在自己的时间里完成转变。手摇冰茶的每一摇，都是对时间的尊重。",

// ===== Pick random drink for a card =====
function pickDrink(card) {
  const drinks = card.drinks;
  const idx = Math.floor(Math.random() * drinks.length);
  return { drink: drinks[idx], reason: card.reasons[drinks[idx].detail] };
}

// ===== Starry Background =====
const canvas = document.getElementById('stars-canvas');
const ctx = canvas.getContext('2d');
let stars = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
function createStars() {
  stars = [];
  const count = Math.floor((canvas.width * canvas.height) / 1800);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.3, twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.02 + 0.005, opacity: Math.random() * 0.6 + 0.3,
    });
  }
}
function drawStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const s of stars) {
    s.twinkle += s.speed;
    const alpha = s.opacity + Math.sin(s.twinkle) * 0.3;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,233,160,${Math.max(0,Math.min(1,alpha))})`;
    ctx.fill();
  }
  requestAnimationFrame(drawStars);
}
resizeCanvas(); createStars(); drawStars();
window.addEventListener('resize', () => { resizeCanvas(); createStars(); });

// ===== Floating Particles =====
function spawnParticle(x, y) {
  const emojis = ['✨','⭐','💫','🌟','🔮','🌙','💜','🪄'];
  const el = document.createElement('span');
  el.className = 'particle';
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  el.style.left = x + 'px'; el.style.top = y + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}
document.addEventListener('click', (e) => {
  for (let i = 0; i < 5; i++) {
    setTimeout(() => {
      spawnParticle(e.clientX + (Math.random() - 0.5) * 60, e.clientY + (Math.random() - 0.5) * 30);
    }, i * 40);
  }
});

// ===== Page Navigation =====
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===== Shuffle & Draw =====
function shuffle(arr) { const a = [...arr]; for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

let drawnCards = []; // [{card, pickedDrink, reason}]

function goToDraw() {
  const selected = shuffle(tarotCards).slice(0, 3);
  drawnCards = selected.map(card => {
    const { drink, reason } = pickDrink(card);
    return { card, drink, reason };
  });
  renderCards();
  showPage('page-draw');
}

function renderCards() {
  const container = document.getElementById('cardsContainer');
  const patterns = ['🔮','🌙','⭐','✨','🪄','💎','🃏','🌟'];
  container.innerHTML = drawnCards.map((dc, i) => `
    <div class="card-scene" onclick="revealCard(${i}, this)" id="cardScene${i}">
      <div class="card-inner">
        <div class="card-back">
          <span class="card-back-pattern">${patterns[i % patterns.length]}</span>
          <span class="card-back-moon">🌙</span>
        </div>
        <div class="card-front">
          <span class="card-emoji">${dc.card.emoji}</span>
          <span class="card-name">${dc.card.name}</span>
          <span class="card-en">${dc.card.nameEn}</span>
          <span class="card-keywords">${dc.card.keywords}</span>
          <div class="card-divider"></div>
          <span class="card-drink-icon">${dc.drink.emoji}</span>
          <span class="card-drink">${dc.drink.name}</span>
          <span class="card-shop">${dc.drink.shop}</span>
        </div>
      </div>
    </div>
  `).join('');
}

function revealCard(index, sceneEl) {
  sceneEl.classList.add('flipped');
  setTimeout(() => showResult(drawnCards[index]), 900);
}

function showResult(dc) {
  const { card, drink, reason } = dc;
  const content = document.getElementById('resultContent');
  content.innerHTML = `
    <div class="result-card-display">
      <span class="result-emoji">${card.emoji}</span>
      <div class="result-card-name">${card.name} · ${card.nameEn}</div>
      <div class="result-card-keywords">${card.keywords}</div>
    </div>
    <div class="result-drink-section">
      <div class="result-drink-label">🃏 塔罗为你指引的今日饮品</div>
      <div class="result-drink-name">${drink.emoji} ${drink.name}</div>
      <div class="result-drink-shop">${drink.shop}</div>
      <span class="result-drink-detail">${drink.detail}</span>
    </div>
    <div class="result-reason">
      <div class="result-reason-label">💫 塔罗的指引</div>
      ${reason}
    </div>
    <button class="btn-retry" onclick="goToDraw()">✨ 再抽一次</button>
  `;
  showPage('page-result');
  for (let i = 0; i < 12; i++) {
    setTimeout(() => {
      spawnParticle(window.innerWidth/2 + (Math.random()-.5)*300, window.innerHeight/2 + (Math.random()-.5)*200);
    }, i * 80);
  }
}
